name: CI
permissions:
  contents: write
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ticketing_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ticketing_test?schema=public
      JWT_SECRET: test-secret-for-ci
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - name: Install backend dependencies
        working-directory: ./server
        run: npm ci
      - name: Apply database migrations
        working-directory: ./server
        run: npx prisma migrate deploy
      - name: Run backend unit + integration tests
        working-directory: ./server
        run: npm test
      - name: Run BDD tests
        working-directory: ./server
        run: npm run test:bdd
  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      - name: Install frontend dependencies
        working-directory: ./client
        run: npm ci
      - name: Run frontend unit tests
        working-directory: ./client
        run: npm test
  e2e-tests:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      - name: Install frontend dependencies
        working-directory: ./client
        run: npm ci
      - name: Run Cypress E2E tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: client
          build: npm run build
          start: npm run preview -- --port 5173
          wait-on: 'http://localhost:5173'
          wait-on-timeout: 60
          spec: cypress/e2e/homepage.cy.js
  deploy:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, e2e-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Promote main to production
        run: |
          git checkout production
          git merge main --ff-only
          git push origin production