services:
  - type: web
    name: ticketing-backend
    runtime: node
    repo: https://github.com/NASEYIO/ticketing-project  # Update this URL
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://your-frontend.vercel.app  # Update after frontend deploys